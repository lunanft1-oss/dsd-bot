<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Logística DSD - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #111827;
            --accent: #25D366;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --bg-ticket: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F3F4F6;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .ticket {
            background: var(--bg-ticket);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: var(--primary);
            padding: 30px 25px;
            color: white;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .badge {
            background: #D1FAE5;
            color: #065F46;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            margin-top: 15px;
        }

        .content {
            padding: 25px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .item label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .item span {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 700;
        }

        .stats-box {
            background: #F9FAFB;
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            border: 1px solid #E5E7EB;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .footer {
            border-top: 2px dashed #E5E7EB;
            padding: 25px;
            text-align: center;
        }

        .location {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .barcode {
            background: #F3F4F6;
            padding: 10px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #9CA3AF;
            letter-spacing: 4px;
        }

        .success-msg {
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="ticket">
        <div class="header">
            <h1>LOGÍSTICA DSD</h1>
            <p>Controle de Viagens</p>
            <div class="badge">✅ PROCESSADO COM SUCESSO</div>
        </div>

        <div class="content">
            <h2 class="section-title">🚛 Ticket de Saída</h2>

            <div class="grid">
                <div class="item">
                    <label>Placa</label>
                    <span>GIO-9717</span>
                </div>
                <div class="item">
                    <label>Modelo</label>
                    <span>TRUCK</span>
                </div>
                <div class="item">
                    <label>Data</label>
                    <span>27/04/2026</span>
                </div>
                <div class="item">
                    <label>Saída Nº</label>
                    <span>1</span>
                </div>
                <div class="item">
                    <label>Hora Saída</label>
                    <span>07:30</span>
                </div>
                <div class="item">
                    <label>Hora Chegada</label>
                    <span>16:45</span>
                </div>
            </div>

            <div class="item" style="margin-bottom: 25px;">
                <label>Responsável / Equipe</label>
                <span>Carlos + Ronaldo, Diogo</span>
            </div>

            <div class="stats-box">
                <div class="stat-item">
                    <span class="stat-value">15</span>
                    <span class="stat-label">Motos</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">42</span>
                    <span class="stat-label">Entregas</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item">
                        <span class="stat-value">05</span>
                        <span class="stat-label">Coletas</span>
                    </span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">02</span>
                    <span class="stat-label">Motores</span>
                </div>
            </div>

            <div class="location">
                📍 São José dos Campos - SP
            </div>
        </div>

        <div class="footer">
            <div class="barcode">||| || | || |||| DSD-270426-001</div>
            <p class="success-msg">Viagem registrada em 27/04/2026 às 11:45</p>
        </div>
    </div>
</body>

</html>
