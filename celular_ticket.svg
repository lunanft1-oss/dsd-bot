        <text x="0" y="155" fill="white" style="font-family: Arial; font-size: 12px;">👤 Responsável: <tspan font-weight="bold">Carlos</tspan></text>
        <text x="0" y="175" fill="white" style="font-family: Arial; font-size: 12px;">👥 Equipe: <tspan font-weight="bold">Ronaldo, Diogo</tspan></text>
        
        <text x="0" y="205" fill="white" style="font-family: Arial; font-size: 12px;">🛣️ KM Final: <tspan font-weight="bold">125.450</tspan></text>
        <text x="0" y="225" fill="#00A884" style="font-family: Arial; font-weight: bold; font-size: 14px;">🕐 Chegada: <tspan font-weight="bold">14:30</tspan> <tspan fill="#00A884" font-size="10px;">(automático)</tspan></text>
        
