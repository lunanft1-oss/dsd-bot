        <text x="0" y="75" fill="white" style="font-family: Arial; font-size: 12px;">🚗 Placa: <tspan font-weight="bold">GIO-9717</tspan></text>
        <text x="0" y="95" fill="white" style="font-family: Arial; font-size: 12px;">🚚 Modelo: <tspan font-weight="bold">Truck</tspan></text>
        <text x="0" y="115" fill="white" style="font-family: Arial; font-size: 12px;">📅 Data: <tspan font-weight="bold">29/04/2026</tspan></text>
